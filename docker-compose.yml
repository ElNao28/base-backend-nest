version: '1.0.0'
services:
  postgres:
    image: postgres:14-alpine
    container_name: ${NAME_POSTGRES_CONTAINER:-postgres-container}
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-base_backend}
    restart: always
    volumes:
      - ./postgres:/var/lib/postgresql/data

  pgAdmin:
    image: elestio/pgadmin:REL-9_14
    ports:
      - ${PGADMIN_LISTEN_PORT:-8080}:8080
    environment:
      - PGADMIN_LISTEN_PORT=${PGADMIN_LISTEN_PORT:-8080}
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL:-base@email.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD:-admin}
    restart: always
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json
